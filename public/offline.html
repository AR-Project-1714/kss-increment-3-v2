<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <title>Offline - Sistem Laporan KSS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-top: #EFF6FF;
            --bg-bottom: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #475569;
            --hint-bg: rgba(245, 158, 11, 0.10);
            --hint-border: rgba(245, 158, 11, 0.35);
            --hint-text: #92400E;
            --btn-bg: #F7931E;
            --btn-bg-hover: #E67E00;
            --btn-text: #FFFFFF;
            --focus-ring: rgba(37, 99, 235, 0.35);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-top: #172033;
                --bg-bottom: #0B1220;
                --text-main: #F1F5F9;
                --text-muted: #94A3B8;
                --hint-bg: rgba(245, 158, 11, 0.12);
                --hint-border: rgba(245, 158, 11, 0.3);
                --hint-text: #FBBF63;
                --btn-bg: #F7931E;
                --btn-bg-hover: #FB923C;
                --focus-ring: rgba(96, 165, 250, 0.45);
            }
        }

        html, body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .offline-wrap {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .offline-illustration {
            width: clamp(140px, 34vw, 220px);
            height: clamp(140px, 34vw, 220px);
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(19px, 4.2vw, 23px);
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        p.offline-desc {
            font-size: clamp(13px, 3.4vw, 14px);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 320px;
        }

        .offline-hint {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--hint-bg);
            border: 1px solid var(--hint-border);
            color: var(--hint-text);
            font-size: 12px;
            line-height: 1.6;
            text-align: left;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .offline-hint svg {
            flex: 0 0 auto;
            margin-top: 1px;
        }

        .offline-retry {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: 999px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .offline-retry:hover { background: var(--btn-bg-hover); }
        .offline-retry:active { transform: scale(0.97); }
        .offline-retry:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .offline-retry svg {
            transition: transform 0.4s ease;
        }
        .offline-retry:hover svg {
            transform: rotate(180deg);
        }

        .offline-retry:disabled {
            cursor: wait;
            opacity: 0.9;
        }

        @keyframes offline-retry-spin {
            to { transform: rotate(360deg); }
        }

        .offline-retry.is-loading svg {
            animation: offline-retry-spin 0.8s linear infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            .offline-retry, .offline-retry svg { transition: none; }
            .offline-retry.is-loading svg { animation: none; }
        }

        @media (max-width: 360px) {
            .offline-hint { font-size: 11.5px; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="offline-wrap">
        <img
            class="offline-illustration"
            src="/assets/kss-offline_state.webp"
            alt="Maskot KSS memegang kabel yang terlepas, menandakan tidak ada koneksi internet"
            width="220"
            height="220"
        >
        <h1>Tidak Ada Koneksi Internet</h1>
        <p class="offline-desc">Halaman ini tidak bisa dimuat karena perangkat Anda sedang offline. Periksa sinyal atau Wi-Fi, lalu coba lagi.</p>
        <div class="offline-hint">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 8V13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="16.5" r="1" fill="currentColor"/>
            </svg>
            <span>Isian laporan yang sempat diketik saat offline tersimpan otomatis di perangkat dan akan dikirim ulang begitu koneksi kembali.</span>
        </div>
        <button class="offline-retry" type="button" onclick="retryConnection(this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4V9H4.58152M19.9381 11C19.446 7.05369 16.0796 4 12 4C8.64262 4 5.76829 6.06817 4.58152 9M4.58152 9H9M20 20V15H19.4185M19.4185 15C18.2317 17.9318 15.3574 20 12 20C7.92038 20 4.55399 16.9463 4.06189 13M19.4185 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="offline-retry-label" aria-live="polite">Coba Lagi</span>
        </button>
    </div>
    <script>
        var RETRY_SPIN_DURATION = 6000; // Batas putaran tombol; setelah ini tombol aktif lagi bila reload belum berhasil.

        function retryConnection(button) {
            if (button.disabled) return;

            var label = button.querySelector('.offline-retry-label');
            button.disabled = true;
            button.classList.add('is-loading');
            label.textContent = 'Menghubungkan kembali...';

            window.location.reload();

            // Reload gagal (masih offline) tidak selalu langsung mengganti halaman ini
            // (bisa menggantung menunggu timeout jaringan), jadi tombol dikembalikan
            // aktif setelah beberapa detik agar pengguna bisa mencoba lagi.
            window.setTimeout(function () {
                button.disabled = false;
                button.classList.remove('is-loading');
                label.textContent = 'Coba Lagi';
            }, RETRY_SPIN_DURATION);
        }
    </script>
</body>
</html>
